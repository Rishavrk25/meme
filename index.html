<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Meme Generator</h1>
            <p>Enter a prompt and get a hilarious meme!</p>
        </header>
        
        <main>
            <div class="input-section">
                <form id="meme-form">
                    <div class="form-group">
                        <label for="prompt">Your Prompt:</label>
                        <input type="text" id="prompt" placeholder="Enter something funny..." required>
                    </div>
                    <button type="submit" id="generate-btn">Generate Meme</button>
                </form>
            </div>
            
            <div class="output-section">
                <div id="loading" class="hidden">Generating your memes... (This may take up to a minute)</div>
                <div id="meme-container" class="hidden grid-container">
                    <!-- Images will be dynamically added here -->
                </div>
                <div id="error-message" class="hidden"></div>
            </div>
        </main>
        
        <footer>
            <p>Created with ❤️ | Using  meme APIs</p>
        </footer>
    </div>
    
    <script src="script.js" type="module"></script>
</body>
</html>
